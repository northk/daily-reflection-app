<div class="entry-detail-page">

  <button mat-button routerLink="/entries" class="back-link">
    <mat-icon>arrow_back</mat-icon>
    All Entries
  </button>

  @if (loading) {
    <app-loading />
  } @else if (entry) {
    <app-entry-editor
      [entry]="entry"
      [saving]="saving"
      (save)="onSave($event)"
    />

    <div class="delete-section">
      @if (showDeleteConfirm) {
        <p class="delete-confirm-text">Are you sure you want to delete this entry?</p>
        <div class="delete-confirm-actions">
          <button mat-flat-button (click)="onDeleteConfirm()">Yes, delete</button>
          <button mat-button (click)="onDeleteCancel()">Cancel</button>
        </div>
      } @else {
        <button mat-button (click)="onDeleteRequest()">
          <mat-icon>delete</mat-icon>
          Delete Entry
        </button>
      }
    </div>
  }

</div>
