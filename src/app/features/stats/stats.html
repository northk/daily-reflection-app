<div class="stats-page">

  <h1 class="stats-title">Your Stats</h1>
  <p class="stats-subtitle">Last 14 days</p>

  @if (loading) {
    <app-loading />
  } @else {

    <div class="stat-cards">
      <mat-card class="stat-card">
        <mat-card-content>
          <div class="stat-value">{{ streak }}</div>
          <div class="stat-label">Day Streak</div>
        </mat-card-content>
      </mat-card>

      <mat-card class="stat-card">
        <mat-card-content>
          <div class="stat-value">{{ entryCount }}</div>
          <div class="stat-label">Entries</div>
        </mat-card-content>
      </mat-card>

      <mat-card class="stat-card">
        <mat-card-content>
          <div class="stat-value">{{ averageMood ?? '–' }}</div>
          <div class="stat-label">Avg Mood</div>
        </mat-card-content>
      </mat-card>
    </div>

    @if (topTags.length > 0) {
      <mat-card class="section-card">
        <mat-card-header>
          <mat-card-title>Top Tags</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="tag-list">
            @for (item of topTags; track item.tag) {
              <span class="tag-badge">
                {{ item.tag }}<span class="tag-count"> ×{{ item.count }}</span>
              </span>
            }
          </div>
        </mat-card-content>
      </mat-card>
    }

    <mat-card class="section-card">
      <mat-card-header>
        <mat-card-title>Word Count</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          <canvas baseChart
            [type]="'bar'"
            [data]="chartData"
            [options]="chartOptions"
          ></canvas>
        </div>
      </mat-card-content>
    </mat-card>

  }

</div>
