<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sky background -->
  <rect width="64" height="64" rx="12" fill="#4DCDD7"/>
  <!-- Sun rays (8 rounded bars radiating outward) -->
  <g transform="translate(32,32)">
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5"/>
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5" transform="rotate(45)"/>
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5" transform="rotate(90)"/>
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5" transform="rotate(135)"/>
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5" transform="rotate(180)"/>
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5" transform="rotate(225)"/>
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5" transform="rotate(270)"/>
    <rect fill="#FFD887" x="-2.5" y="-29" width="5" height="12" rx="2.5" transform="rotate(315)"/>
  </g>
  <!-- Sun circle -->
  <circle cx="32" cy="32" r="14" fill="#F48C09"/>
</svg>
